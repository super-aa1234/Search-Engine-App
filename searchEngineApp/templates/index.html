<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            margin-top: 80px;
        }
        .box {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        ul {
            margin-top: 20px;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Movie Search</h2>
        <form method="POST">
            <input type="text" name="query" placeholder="Search..." value="{{ query }}">
            <button type="submit">Search</button>
        </form>

        {% if results %}
            <ul>
                {% for movie in results %}
                    <li>{{ movie }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
</body>
</html>
